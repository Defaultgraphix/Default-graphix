<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Default Graphix</title>
    <link rel="icon" type="image/png" href="dg_logo.png">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="DG_try.css">
</head>
<body>


    <nav class="navbar"> 
        <div class="logo-container">
            <img src="logo.png" alt="Default Graphix Logo" class="nav-logo">
            <span class="brand-name">DEFAULT <span class="accent">GRAPHIX</span></span>
        </div>
        <ul class="nav-links">
            <li><a href="#home">Home</a></li>
            <li><a href="#work">Work</a></li>
            <li><a href="#contact">Contact</a></li>
        </ul>
    </nav>

    <section id="home" class="hero">
        <div class="hero-content">
            <h1 class="glitch">Visions Brought to <span class="neon-text">Life</span>.</h1>
            <p>Premium Graphic Design & Digital Artistry</p>
            <a href="#work" class="btn">View My Gallery</a>
        </div>
    </section>

    <section id="work" class="gallery-section">
        <h2>Selected <span class="neon-text">Works</span></h2>
        <div class="grid-container">
            <div class="grid-item"><img src="https://via.placeholder.com/400x400" alt="Work 1"></div>
            <div class="grid-item"><img src="https://via.placeholder.com/400x400" alt="Work 2"></div>
            <div class="grid-item"><img src="https://via.placeholder.com/400x400" alt="Work 3"></div>
            <div class="grid-item"><img src="https://via.placeholder.com/400x400" alt="Work 4"></div>
            <div class="grid-item"><img src="https://via.placeholder.com/400x400" alt="Work 5"></div>
            <div class="grid-item"><img src="https://via.placeholder.com/400x400" alt="Work 6"></div>
        </div>
    </section>

    <section id="contact" class="contact-section">
        <div class="contact-card">
            <h2>Let's <span class="neon-text">Connect</span></h2>
            <form id="contact-form">
                <input type="text" placeholder="Name" required>
                <input type="email" placeholder="Email" required>
                <textarea placeholder="Your Message" rows="5" required></textarea>
                <button type="submit" class="btn">Send Message</button>
            </form>
        </div>
    </section>

    <div id="ai-assistant" class="ai-bubble">
        <div class="ai-icon">DG</div>
    </div>

    <footer>
        <p>&copy; 2026 Default Graphix. All Rights Reserved.</p>
    </footer>

    <script src="DG_try.js"></script>
</body>
</html>
